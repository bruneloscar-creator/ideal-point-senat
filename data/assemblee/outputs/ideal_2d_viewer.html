lor": "#B5E2F9"}, {"x": -0.2208600081401336, "y": 0.7661227271353707, "name": "Gabrielle Cathala", "group": "LFI-NFP", "groupFull": "La France insoumise - Nouveau Front Populaire", "color": "#C00D0D"}, {"x": 0.08547508633446241, "y": 0.5997929391362221, "name": "Romain Eskenazi", "group": "SOC", "groupFull": "Socialistes et apparentés", "color": "#F5B4CE"}, {"x": 0.04367795793420016, "y": 0.5482308325600361, "name": "Béatrice Bellay", "group": "SOC", "groupFull": "Socialistes et apparentés", "color": "#F5B4CE"}, {"x": -0.07138773163162299, "y": -0.7253435502048234, "name": "Joseph Rivière", "group": "RN", "groupFull": "Rassemblement National", "color": "#313567"}, {"x": -0.08918687635374101, "y": -0.8101297619177524, "name": "Anne Sicard", "group": "RN", "groupFull": "Rassemblement National", "color": "#313567"}, {"x": 0.07594420247359594, "y": 0.5643166351931513, "name": "Ayda Hadizadeh", "group": "SOC", "groupFull": "Socialistes et apparentés", "color": "#F5B4CE"}, {"x": -0.061694374208731424, "y": 0.5167178349060421, "name": "Emmanuel Maurel", "group": "GDR", "groupFull": "Gauche Démocrate et Républicaine", "color": "#830E21"}, {"x": -0.07112198292041395, "y": -0.6333070163013591, "name": "Anchya Bamana", "group": "RN", "groupFull": "Rassemblement National", "color": "#313567"}, {"x": -0.09583721235418026, "y": 0.4253429191734817, "name": "Emmanuel Tjibaou", "group": "GDR", "groupFull": "Gauche Démocrate et Républicaine", "color": "#830E21"}, {"x": 0.4059931043361099, "y": -0.0543687016831024, "name": "Vincent Caure", "group": "EPR", "groupFull": "Ensemble pour la République", "color": "#7B4591"}, {"x": 0.2765993323504382, "y": 0.0242227637961185, "name": "Alim Latrèche", "group": "EPR", "groupFull": "Ensemble pour la République", "color": "#7B4591"}, {"x": 0.22449361341642193, "y": -0.3760303156144154, "name": "Lionel Duparay", "group": "DR", "groupFull": "Droite Républicaine", "color": "#8CB0DC"}, {"x": 0.0053380532265598635, "y": -0.5823494511613768, "name": "Antoine Valentin", "group": "UDR", "groupFull": "Union des droites pour la République", "color": "#3367A7"}, {"x": 0.3539796654228916, "y": -0.0624673226491861, "name": "Marie-Philippe Lubet", "group": "EPR", "groupFull": "Ensemble pour la République", "color": "#7B4591"}, {"x": 0.18432209679931372, "y": -0.1222167440535759, "name": "Charles de Courson", "group": "LIOT", "groupFull": "Libertés, Indépendants, Outre-mer et Territoires", "color": "#FFD96F"}], "legend": [{"group": "RN", "color": "#313567", "n": 122, "cx": -0.06823085833017248, "cy": -0.721206405375645}, {"group": "EPR", "color": "#7B4591", "n": 91, "cx": 0.3567399205037272, "cy": -0.09069195094319875}, {"group": "SOC", "color": "#F5B4CE", "n": 82, "cx": 0.08325886323999228, "cy": 0.5175622812082363}, {"group": "LFI-NFP", "color": "#C00D0D", "n": 71, "cx": -0.23000138811615034, "cy": 0.7715039181582894}, {"group": "UDR", "color": "#3367A7", "n": 62, "cx": 0.03999021319026488, "cy": -0.6829883633697957}, {"group": "DR", "color": "#8CB0DC", "n": 47, "cx": 0.20765023081355702, "cy": -0.3492869970604255}, {"group": "EcoS", "color": "#77AA79", "n": 38, "cx": -0.0643154071798947, "cy": 0.7007127534374566}, {"group": "Dem", "color": "#F07E26", "n": 37, "cx": 0.26128851772359507, "cy": -0.04971652599833853}, {"group": "HOR", "color": "#B5E2F9", "n": 37, "cx": 0.27128109271033624, "cy": -0.1452101193354183}, {"group": "LIOT", "color": "#FFD96F", "n": 26, "cx": 0.1422946682216375, "cy": 0.04467253875009479}, {"group": "GDR", "color": "#830E21", "n": 17, "cx": -0.09190366227873983, "cy": 0.504467224331105}, {"group": "NI", "color": "#8D949A", "n": 16, "cx": 0.06726266680425966, "cy": -0.35958287022432955}]};
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const tip = document.getElementById("tip");
const active = new Set(DATA.legend.map(g => g.group));

const pad = { l: 48, r: 24, t: 24, b: 44 };
const xs = DATA.points.map(p => p.x), ys = DATA.points.map(p => p.y);
const xmin = Math.min(...xs), xmax = Math.max(...xs);
const ymin = Math.min(...ys), ymax = Math.max(...ys);
const dx = (xmax - xmin) || 1, dy = (ymax - ymin) || 1;
// pad ranges a bit
const x0 = xmin - 0.05*dx, x1 = xmax + 0.05*dx;
const y0 = ymin - 0.05*dy, y1 = ymax + 0.05*dy;

function sx(x) { return pad.l + (x - x0) / (x1 - x0) * (canvas.width - pad.l - pad.r); }
function sy(y) { return pad.t + (1 - (y - y0) / (y1 - y0)) * (canvas.height - pad.t - pad.b); }

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // axes
  ctx.strokeStyle = "#ccc"; ctx.lineWidth = 1;
  const zx = sx(0), zy = sy(0);
  ctx.beginPath(); ctx.moveTo(pad.l, zy); ctx.lineTo(canvas.width - pad.r, zy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(zx, pad.t); ctx.lineTo(zx, canvas.height - pad.b); ctx.stroke();
  ctx.fillStyle = "#888"; ctx.font = "12px system-ui, sans-serif";
  ctx.fillText("dim1 →", canvas.width - pad.r - 48, zy - 6);
  ctx.fillText("dim2 ↑", zx + 6, pad.t + 12);

  for (const p of DATA.points) {
    const on = active.has(p.group);
    ctx.globalAlpha = on ? 0.85 : 0.08;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(sx(p.x), sy(p.y), on ? 4.2 : 3, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  // group labels at centers
  ctx.font = "600 11px system-ui, sans-serif";
  for (const g of DATA.legend) {
    if (!active.has(g.group)) continue;
    ctx.fillStyle = "#222";
    ctx.strokeStyle = "rgba(255,255,255,0.85)";
    ctx.lineWidth = 3;
    const tx = sx(g.cx), ty = sy(g.cy);
    ctx.strokeText(g.group, tx + 6, ty - 6);
    ctx.fillText(g.group, tx + 6, ty - 6);
  }
}

const leg = document.getElementById("legend");
leg.innerHTML = "<h2>Groupes</h2>" + DATA.legend.map(g =>
  `<div class="leg-item" data-g="${g.group}"><span class="swatch" style="background:${g.color}"></span><span>${g.group} <span style="color:#999">(${g.n})</span></span></div>`
).join("");
leg.addEventListener("click", e => {
  const el = e.target.closest(".leg-item");
  if (!el) return;
  const g = el.dataset.g;
  if (active.size === DATA.legend.length) {
    active.clear(); active.add(g);
  } else if (active.has(g) && active.size === 1) {
    DATA.legend.forEach(x => active.add(x.group));
  } else if (active.has(g)) {
    active.delete(g);
  } else {
    active.add(g);
  }
  [...leg.children].forEach(c => { if (c.dataset?.g) c.classList.toggle("dim", !active.has(c.dataset.g)); });
  draw();
});

canvas.addEventListener("mousemove", e => {
  const r = canvas.getBoundingClientRect();
  const mx = (e.clientX - r.left) * (canvas.width / r.width);
  const my = (e.clientY - r.top) * (canvas.height / r.height);
  let best = null, bestD = 12;
  for (const p of DATA.points) {
    if (!active.has(p.group)) continue;
    const d = Math.hypot(sx(p.x) - mx, sy(p.y) - my);
    if (d < bestD) { bestD = d; best = p; }
  }
  if (best) {
    tip.style.display = "block";
    tip.style.left = (e.clientX + 12) + "px";
    tip.style.top = (e.clientY + 12) + "px";
    tip.innerHTML = `<strong>${best.name}</strong><br/>${best.groupFull || best.group}<br/>dim1=${best.x.toFixed(3)} · dim2=${best.y.toFixed(3)}`;
  } else {
    tip.style.display = "none";
  }
});
canvas.addEventListener("mouseleave", () => tip.style.display = "none");

draw();
</script>
